x-service-common: &service-common
  image: joycegodinhoo/rinha-2026-api:v0.1.4
  platform: linux/amd64
  environment:
    GC_MODE: off
  volumes:
    - sockets-volume:/sockets
  networks:
    - backend
  deploy:
    resources:
      limits:
        cpus: "0.31"
        memory: "149M"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

services:
  service-1:
    <<: *service-common
    environment:
      GC_MODE: off
      SOCKET_PATH: /sockets/service-1.sock

  service-2:
    <<: *service-common
    environment:
      GC_MODE: off
      SOCKET_PATH: /sockets/service-2.sock

  load-balancer:
    image: haproxy:2.9-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    depends_on:
      service-1:
        condition: service_started
      service-2:
        condition: service_started
    volumes:
      - ./load-balancer/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets-volume:/sockets
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.32"
          memory: "40M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  warmup:
    image: curlimages/curl:8.8.0
    platform: linux/amd64
    entrypoint: ["/bin/sh", "/warmup.sh"]
    environment:
      - BASE_URL=http://load-balancer:9999
      - READY_RETRIES=240
      - READY_SLEEP=0.2
      - WARMUP_ROUNDS=48
    volumes:
      - ./scripts/warmup.sh:/warmup.sh:ro
    depends_on:
      load-balancer:
        condition: service_started
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.06"
          memory: "12M"
    restart: "no"

networks:
  backend:
    driver: bridge

volumes:
  sockets-volume:

x-service-common: &service-common
  image: joycegodinhoo/rinha-2026-api:v0.1.7-test-4
  platform: linux/amd64
  environment:
    GC_MODE: off
    GOGC: "500"
    GOMEMLIMIT: "60MiB"
    SERVICE_MODE: raw
    # SERVICE_MODE: ${SERVICE_MODE:-}
  volumes:
    - sockets-volume:/sockets
  networks:
    - backend
  deploy:
    resources:
      limits:
        cpus: "0.3"
        memory: "149M"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

services:
  service-1:
    <<: *service-common
    environment:
      GC_MODE: off
      GOGC: "500"
      GOMEMLIMIT: "60MiB"
      SERVICE_MODE: raw
      SOCKET_PATH: /sockets/service-1.sock

  service-2:
    <<: *service-common
    environment:
      GC_MODE: off
      GOGC: "500"
      GOMEMLIMIT: "60MiB"
      SERVICE_MODE: raw
      SOCKET_PATH: /sockets/service-2.sock

  load-balancer:
    image: haproxy:2.9-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    depends_on:
      - service-1
      - service-2
    volumes:
      - ./load-balancer/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets-volume:/sockets
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.36"
          memory: "40M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  warmup:
    image: curlimages/curl:8.8.0
    platform: linux/amd64
    entrypoint: ["/bin/sh", "/warmup.sh"]
    environment:
      - BASE_URL=http://load-balancer:9999
      - READY_RETRIES=240
      - READY_SLEEP=0.25
      - WARMUP_ROUNDS=48
    volumes:
      - ./scripts/warmup.sh:/warmup.sh:ro
    depends_on:
      - load-balancer
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.04"
          memory: "12M"
    restart: "no"

networks:
  backend:
    driver: bridge

volumes:
  sockets-volume:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m,mode=0777
